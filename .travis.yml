language: go

branches:
  only:
  - master

install:
  - go get -d -t -v ./...
  - go get -v golang.org/x/lint/golint

matrix:
  include:
    - name: "go1.13.x-linux-race 1"
      go: 1.13.x
      os: linux
      script: make testrace TAGS=
