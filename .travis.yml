      go: 1.13.x
      os: linux
      script: make testrace TAGS=
    - name: "go1.13.x-linux-race 3"
      go: 1.13.x
      os: linux
      script: make testrace TAGS=
    - name: "go1.13.x-linux-race 4"
      go: 1.13.x
      os: linux
      script: make testrace TAGS=

notifications:
