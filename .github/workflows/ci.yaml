name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go:
          - "1.14"
          - "1.15"
          - "1.16"
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go ${{ matrix.go }}
      uses: actions/setup-go@v2
      with:
        go-version: ${{ matrix.go }}

    - name: install golint
      run: go get golang.org/x/lint/golint

    - name: make test generate (go ${{ matrix.go }})
      run: make test generate

  linux-race:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: "1.16"

    - name: install golint
      run: go get golang.org/x/lint/golint

    - run: make testrace TAGS=

  linux-no-invariants:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: "1.16"

    - name: install golint
      run: go get golang.org/x/lint/golint

    - run: make test TAGS=

  linux-no-cgo:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: "1.16"

    - name: install golint
      run: go get golang.org/x/lint/golint

    - env:
        CGO_ENABLED: "0"
      run: make test TAGS=

  darwin:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: "1.16"

    - name: install golint
      run: go get golang.org/x/lint/golint

    - run: make test

  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: "1.16"

    - run: go test -v ./...

  freebsd:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: "1.16"

    - env:
        GOOS: freebsd
      run: go build -v ./...
